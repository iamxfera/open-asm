name: Sync fork

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror upstream branches and tags
        run: |
          set -e

          git clone --bare https://github.com/oasm-platform/open-asm.git repo
          cd repo

          git remote add fork https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git fetch origin --prune
          git fetch origin --tags --prune

          git push --prune fork 'refs/heads/*:refs/heads/*'
          git push --force fork 'refs/tags/*:refs/tags/*'
