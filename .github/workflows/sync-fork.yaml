name: Sync fork

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror upstream branches and tags
        run: |
          set -e

          git clone --mirror https://github.com/oasm-platform/open-asm.git repo
          cd repo

          git remote set-url --push origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git push --prune origin 'refs/heads/*:refs/heads/*'
          git push --force origin 'refs/tags/*:refs/tags/*'
